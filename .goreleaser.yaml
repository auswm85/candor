# goreleaser configuration — https://goreleaser.com
# Build cross-platform binaries on tag push (see .github/workflows/release.yml).
# Try locally with: goreleaser release --snapshot --clean
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: candor
    main: ./cmd/candor
    binary: candor
    env:
      - CGO_ENABLED=0 # modernc.org/sqlite is pure Go — no CGO needed
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: candor
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{- .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macOS{{ else }}{{ .Os | title }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86-64
      {{- else if eq .Arch "arm64" }}{{ if eq .Os "darwin" }}Apple-Silicon{{ else }}ARM64{{ end }}
      {{- else }}{{ .Arch }}{{ end -}}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  draft: true # review the generated notes before publishing
