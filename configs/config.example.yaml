poll_interval: 5m
database: ~/.local/share/token-tracker/tokens.db

# web dashboard is planned but not built yet — these settings are inert.
web:
  enabled: true
  listen: 127.0.0.1:7878

tui:
  refresh: 1s

# Proxy mode (primary): the daemon runs this by default. Point a coding harness's
# base URL at http://127.0.0.1:7879/<provider>/... to record live per-request
# usage. Your normal inference key is forwarded untouched (no admin key needed).
# Add upstreams for local OpenAI-compatible servers (e.g. ollama: http://localhost:11434).
proxy:
  enabled: true # the daemon runs the proxy alongside the TUI; set false to disable
  listen: 127.0.0.1:7879
  upstreams:
    openai: https://api.openai.com
    openrouter: https://openrouter.ai
    anthropic: https://api.anthropic.com

defaults:
  monthly_budget_usd: 100
  alert_thresholds: [50, 75, 90, 100]

providers:
  openai:
    enabled: true
    keyring_key: token-tracker/openai-api-key
  anthropic:
    enabled: true
    keyring_key: token-tracker/anthropic-admin-key # Requires an Admin API key (sk-ant-admin01-...)
  openrouter:
    enabled: true
    keyring_key: token-tracker/openrouter-api-key

# NOTE: config-driven pricing is not yet wired up. The cost engine currently
# uses built-in defaults (internal/cost.DefaultPrices). This section documents
# the intended override schema; editing it has no effect yet.
prices:
  openai:
    gpt-4o:
      input_per_1m: 2.50
      cached_input_per_1m: 0.3125
      cache_write_per_1m: 3.125
      output_per_1m: 10.00
    gpt-4o-mini:
      input_per_1m: 0.15
      cached_input_per_1m: 0.01875
      cache_write_per_1m: 0.1875
      output_per_1m: 0.60
  anthropic:
    claude-sonnet-4-5:
      input_per_1m: 3.00
      cached_input_per_1m: 0.30
      cache_write_per_1m: 3.75
      output_per_1m: 15.00
    claude-code/claude-sonnet-4-5:
      input_per_1m: 3.00
      cached_input_per_1m: 0.30
      cache_write_per_1m: 3.75
      output_per_1m: 15.00
  openrouter:
    openai/gpt-4o:
      input_per_1m: 2.50
      cached_input_per_1m: 0.3125
      cache_write_per_1m: 3.125
      output_per_1m: 10.00
    anthropic/claude-sonnet-4-5:
      input_per_1m: 3.00
      cached_input_per_1m: 0.30
      cache_write_per_1m: 3.75
      output_per_1m: 15.00
