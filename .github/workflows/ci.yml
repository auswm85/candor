name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - run: go mod tidy
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
      - run: go test -race -count=1 ./...
      - run: go build ./cmd/token-tracker
      - run: go build ./cmd/tt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
