name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed on:"; echo "$out"; exit 1; fi
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - run: go build ./cmd/candor
      # Race detector on Linux/macOS; plain run on Windows (no reliable C toolchain).
      - if: runner.os != 'Windows'
        run: go test -race -count=1 ./...
      - if: runner.os == 'Windows'
        run: go test -count=1 ./...
