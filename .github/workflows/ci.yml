name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'db/migrations/**'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "gofmt needed on:"; echo "$out"; exit 1; fi
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  test:
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Steps are gated individually (not the whole job) so the matrix check
      # contexts always publish; on docs-only PRs they publish as Success.
      - if: needs.changes.outputs.code == 'true'
        uses: actions/checkout@v7
      - if: needs.changes.outputs.code == 'true'
        uses: actions/setup-go@v7
        with:
          go-version: "1.26"
          cache: true
      - if: needs.changes.outputs.code == 'true'
        run: go build ./cmd/candor
      # Race detector on Linux/macOS; plain run on Windows (no reliable C toolchain).
      - if: needs.changes.outputs.code == 'true' && runner.os != 'Windows'
        run: go test -race -count=1 ./...
      - if: needs.changes.outputs.code == 'true' && runner.os == 'Windows'
        run: go test -count=1 ./...
