name: Feature request
description: Suggest an improvement that fits candor's local-first, single-binary scope
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        candor is deliberately small and local-first (no cloud, no telemetry, the
        proxy never affects your real request). Requests that fit that scope are
        most likely to land.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
